<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitalServe Initiative</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #eaf2ff, #f7f9fc);
      color: #1e2a3a;
      text-align: center;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 14px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    nav a {
      text-decoration: none;
      color: #2b4c7e;
      font-weight: 600;
      transition: 0.2s ease;
    }

    nav a:hover {
      color: #0b5cff;
    }

    /* HERO */
    .hero {
      padding: 90px 20px;
    }

    /* LOGO BLOCK */
    .logo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: #6b7c93;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* TEXT */
    h1 {
      font-size: 3rem;
      color: #0b2d5c;
      margin-top: 10px;
    }

    p {
      max-width: 650px;
      margin: 15px auto;
      color: #4a5a70;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    /* BUTTON */
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0b5cff, #3a8dff);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .button:hover {
      transform: scale(1.05);
      opacity: 0.95;
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      padding: 20px;
      color: #6b7c93;
      font-size: 0.9rem;
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>

  <!-- HERO -->
  <div class="hero">

    <!-- LOGO + SUBTITLE -->
    <div class="logo-wrapper">
      <img src="logo.png" alt="VitalServe Logo" class="logo" />
      <div class="subtitle">Non-Profit</div>
    </div>

    <h1>VitalServe Initiative</h1>

    <p>
      A student-led nonprofit dedicated to collecting and distributing essential medical supplies
      to underserved communities through organized donation drives.
    </p>

    <a class="button" href="about.html">Learn More</a>

  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 VitalServe Initiative
  </footer>

</body>
</html>
